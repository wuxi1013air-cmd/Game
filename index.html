<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>迷你游戏站 · Mini Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <header class="site-header">
    <div class="logo">
      <span class="logo-icon">◆</span>
      <span>Mini Arcade</span>
    </div>
    <p class="tagline">在浏览器里玩两把 · 纯前端 · 可部署 GitHub Pages</p>
  </header>

  <main>
    <section id="view-home" class="view active">
      <h1 class="hero-title">选一款游戏</h1>
      <div class="game-cards">
        <button type="button" class="game-card" data-game="snake">
          <span class="card-emoji">🐍</span>
          <span class="card-name">贪吃蛇</span>
          <span class="card-desc">方向键移动，别撞墙和自己</span>
        </button>
        <button type="button" class="game-card" data-game="memory">
          <span class="card-emoji">🎴</span>
          <span class="card-name">记忆翻牌</span>
          <span class="card-desc">找出所有相同图案配对</span>
        </button>
      </div>
    </section>

    <section id="view-snake" class="view">
      <div class="game-toolbar">
        <button type="button" class="btn ghost" data-back>← 返回</button>
        <div class="stats">
          <span>分数 <strong id="snake-score">0</strong></span>
          <span>最高 <strong id="snake-best">0</strong></span>
        </div>
        <button type="button" class="btn" id="snake-restart">重新开始</button>
      </div>
      <div class="snake-wrap">
        <canvas id="snake-canvas" width="400" height="400" aria-label="贪吃蛇游戏区域"></canvas>
        <p class="hint">使用 ↑ ↓ ← → 或 WASD 控制</p>
      </div>
    </section>

    <section id="view-memory" class="view">
      <div class="game-toolbar">
        <button type="button" class="btn ghost" data-back>← 返回</button>
        <div class="stats">
          <span>步数 <strong id="memory-moves">0</strong></span>
          <span>配对 <strong id="memory-pairs">0 / 8</strong></span>
        </div>
        <button type="button" class="btn" id="memory-restart">洗牌重来</button>
      </div>
      <div id="memory-board" class="memory-board" role="grid" aria-label="记忆翻牌"></div>
    </section>
  </main>

  <footer class="site-footer">
    <span>本地即玩 · 无后端</span>
  </footer>

  <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
    <div class="overlay-card">
      <h2 id="overlay-title">游戏结束</h2>
      <p id="overlay-msg"></p>
      <button type="button" class="btn" id="overlay-dismiss">知道了</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
